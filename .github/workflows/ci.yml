name: PSC Infrastructure CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python for Simulation Engines
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Architecture Dependencies
      run: |
        python -m pip install --upgrade pip
        # Simulating microservice requirements
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Double-Spending AI Detection Tests
      run: |
        # This will trigger the testing suite for cloud algorithms
        python -m unittest discover -s cloud-architecture -p "*_test.py"
